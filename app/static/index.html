<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAG Evals API — Ask FastAPI Docs</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    max-width: 720px;
    margin: 60px auto;
    padding: 0 20px;
    background: #fafafa;
    color: #1a1a1a;
  }
  h1 { font-size: 22px; margin-bottom: 4px; }
  p.sub { color: #666; margin-top: 0; margin-bottom: 28px; }
  .input-row { display: flex; gap: 8px; margin-bottom: 24px; }
  input {
    flex: 1;
    padding: 12px 14px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
  }
  button {
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    background: #1a1a1a;
    color: white;
    font-size: 14px;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .answer-box {
    background: white;
    border: 1px solid #eee;
    border-radius: 10px;
    padding: 20px;
    display: none;
  }
  .answer-box.visible { display: block; }
  .answer-text { line-height: 1.6; margin-bottom: 16px; }
  .meta { font-size: 12px; color: #888; margin-bottom: 12px; }
  .citation {
    font-size: 12px;
    background: #f5f5f5;
    border-radius: 6px;
    padding: 8px 10px;
    margin-bottom: 6px;
  }
  .citation .src { font-weight: 600; }
  .loading { color: #888; font-size: 14px; }
</style>
</head>
<body>

<h1>RAG Evals API</h1>
<p class="sub">Ask anything about FastAPI documentation</p>

<div class="input-row">
  <input id="query" type="text" placeholder="e.g. How does dependency injection work?" />
  <button id="askBtn" onclick="ask()">Ask</button>
</div>

<div id="loading" class="loading" style="display:none;">Thinking...</div>

<div id="answerBox" class="answer-box">
  <div class="answer-text" id="answerText"></div>
  <div class="meta" id="meta"></div>
  <div id="citations"></div>
</div>

<script>
async function ask() {
  const query = document.getElementById('query').value.trim();
  if (!query) return;

  const btn = document.getElementById('askBtn');
  const loading = document.getElementById('loading');
  const box = document.getElementById('answerBox');

  btn.disabled = true;
  loading.style.display = 'block';
  box.classList.remove('visible');

  try {
    const res = await fetch('/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, top_k: 5 })
    });
    const data = await res.json();

    document.getElementById('answerText').textContent = data.answer;
    document.getElementById('meta').textContent =
      `${data.latency_ms}ms · cache: ${data.cache_hit} · status: ${data.retrieval_status}`;

    const citEl = document.getElementById('citations');
    citEl.innerHTML = '';
    (data.citations || []).forEach(c => {
      const div = document.createElement('div');
      div.className = 'citation';
      div.innerHTML = `<span class="src">${c.ref} ${c.source}</span> — similarity ${c.similarity}`;
      citEl.appendChild(div);
    });

    box.classList.add('visible');
  } catch (err) {
    document.getElementById('answerText').textContent = 'Error: could not reach the API.';
    box.classList.add('visible');
  } finally {
    btn.disabled = false;
    loading.style.display = 'none';
  }
}

document.getElementById('query').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') ask();
});
</script>

</body>
</html>
